<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local AI Stack Portable</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <h2>Configurações</h2>
      <p class="sidebar-section">Status</p>
      <div id="status-badge" class="status-badge status-offline">● Verificando…</div>

      <p class="sidebar-section">Modelo</p>
      <select id="model-select" aria-label="Modelo"></select>

      <p class="sidebar-section">Parâmetros</p>
      <label>Temperature <span class="range-value" id="temp-val"></span></label>
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" />
      <label>Max tokens <span class="range-value" id="mt-val"></span></label>
      <input type="range" id="max-tokens" min="256" max="32768" step="512" value="2048" />

      <label style="margin-top: 0.65rem; display: flex; align-items: center; gap: 8px; cursor: pointer">
        <input type="checkbox" id="think" />
        Raciocínio (thinking)
      </label>

      <p class="sidebar-section">System prompt</p>
      <textarea id="system-prompt" rows="5" placeholder="Instruções do sistema…"></textarea>

      <hr class="hr" />
      <button type="button" class="btn btn-sidebar" id="btn-clear">
        Novo Chat
      </button>
    </aside>

    <div class="history-drawer" id="history-drawer">
      <div class="drawer-handle" title="Histórico de Conversas">
        <span>🕒</span>
      </div>
      <div class="drawer-content">
        <h2>Histórico</h2>
        <div id="history-list" class="history-list">
          <p class="empty-history">Nenhum chat salvo.</p>
        </div>
      </div>
    </div>

    <main class="main">
      <div class="overlay" id="overlay" aria-hidden="true"></div>
      <header class="main-header">
        <button type="button" class="btn-menu" id="btn-menu" aria-label="Menu">☰</button>
        <h1>AI Portable</h1>
        <span class="badge-pill">Pendrive Mode</span>
      </header>

      <div class="alert alert-error" id="alert-error"></div>

      <div class="loading-row" id="loading-row">
        <div class="spinner" aria-hidden="true"></div>
        <span>Gerando resposta…</span>
      </div>

      <div class="messages-wrap" id="messages">
        <div class="welcome" id="welcome">
          <div class="icon">🚀</div>
          <p>Sua IA portátil está pronta.</p>
          <p style="font-size: 0.8rem; color: #555">Os chats são salvos no seu pendrive.</p>
        </div>
      </div>

      <div class="composer">
        <div class="input-wrap">
          <textarea id="message-input" rows="1" placeholder="Digite sua mensagem…" autocomplete="off"></textarea>
          <button type="button" class="btn-send" id="btn-send" title="Enviar">
            <span class="icon-send">➤</span>
            <span class="icon-stop" style="display: none">■</span>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.2/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
